<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rawstyle — Tienda de Ropa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="text-2xl font-bold tracking-tight">RAWSTYLE</a>

        <div class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
            <button onclick="filtrarCategoria(0)"  class="hover:text-black transition-colors">Todos</button>
            <button onclick="filtrarCategoria(1)"  class="hover:text-black transition-colors">Camisas</button>
            <button onclick="filtrarCategoria(2)"  class="hover:text-black transition-colors">Pantalones</button>
            <button onclick="filtrarCategoria(3)"  class="hover:text-black transition-colors">Busos</button>
            <button onclick="filtrarCategoria(4)"  class="hover:text-black transition-colors">Chaquetas</button>
        </div>

        <div class="flex items-center gap-3" id="nav-acciones">

        </div>
    </div>
</nav>


<section class="bg-black text-white py-20 px-4 text-center">
    <h1 class="text-5xl font-bold mb-4 tracking-tight">Nueva Colección</h1>
    <p class="text-gray-400 text-lg mb-8">Ropa para hombre con estilo urbano y calidad premium</p>
    <button onclick="filtrarCategoria(0)"
            class="bg-white text-black px-8 py-3 rounded-lg font-semibold hover:bg-gray-200 transition-colors">
        Ver catálogo
    </button>
</section>

<div class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between">
    <h2 class="text-xl font-semibold" id="titulo-catalogo">Todos los productos</h2>
    <span class="text-sm text-gray-500" id="contador-productos"></span>
</div>

<main class="max-w-6xl mx-auto px-4 pb-16">
    <div id="loading" class="text-center py-16 text-gray-400">Cargando productos...</div>
    <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden"></div>
    <div id="sin-productos" class="text-center py-16 text-gray-400 hidden">No hay productos disponibles.</div>
</main>

<div id="toast"
     class="fixed bottom-6 right-6 bg-black text-white px-5 py-3 rounded-xl shadow-lg text-sm
           transform translate-y-20 opacity-0 transition-all duration-300 z-50">
</div>

<script src="js/api.js"></script>
<script src="js/catalogo.js"></script>
</body>
</html>
