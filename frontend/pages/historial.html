<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mis pedidos — Rawstyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="../index.html" class="text-2xl font-bold tracking-tight">RAWSTYLE</a>
        <span class="font-medium text-gray-700">Mis pedidos</span>
        <div class="flex gap-4">
            <a href="../index.html" class="text-sm text-gray-500 hover:text-black transition-colors">Tienda</a>
            <button onclick="cerrarSesion()" class="text-sm text-gray-500 hover:text-black transition-colors">Salir</button>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-10">
    <div id="loading" class="text-center py-20 text-gray-400">Cargando pedidos...</div>
    <div id="sin-pedidos" class="hidden text-center py-20">
        <p class="text-gray-400 text-lg mb-4">No tienes pedidos aún</p>
        <a href="../index.html"
           class="bg-black text-white px-6 py-2.5 rounded-lg font-medium hover:bg-gray-800 transition-colors">
            Ir a la tienda
        </a>
    </div>
    <div id="lista-pedidos" class="hidden space-y-6"></div>
</main>

<script src="../js/api.js"></script>
<script src="../js/historial.js"></script>
</body>
</html>
