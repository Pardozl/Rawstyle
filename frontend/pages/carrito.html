<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Carrito — Rawstyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">


<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="../index.html" class="text-2xl font-bold tracking-tight">RAWSTYLE</a>
        <span class="text-gray-600 font-medium">Mi carrito</span>
        <a href="../index.html" class="text-sm text-gray-500 hover:text-black transition-colors">
            Seguir comprando
        </a>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-10">
    <div id="loading" class="text-center py-20 text-gray-400">Cargando carrito...</div>
    <div id="carrito-vacio" class="hidden text-center py-20">
        <p class="text-gray-400 text-lg mb-4">Tu carrito está vacío</p>
        <a href="../index.html"
           class="bg-black text-white px-6 py-2.5 rounded-lg font-medium hover:bg-gray-800 transition-colors">
            Ver productos
        </a>
    </div>

    <div id="carrito-contenido" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="lg:col-span-2 space-y-4" id="items-lista"></div>
        <div class="bg-white rounded-2xl border border-gray-100 p-6 h-fit shadow-sm">
            <h2 class="font-semibold text-lg mb-4">Resumen del pedido</h2>
            <div class="space-y-2 text-sm text-gray-600 mb-4">
                <div class="flex justify-between">
                    <span>Subtotal</span>
                    <span id="subtotal">$0</span>
                </div>
                <div class="flex justify-between">
                    <span>Envío</span>
                    <span class="text-green-600">$10.000</span>
                </div>
            </div>
            <div class="border-t pt-4 flex justify-between font-bold text-lg mb-6">
                <span>Total</span>
                <span id="total-final">$0</span>
            </div>
            <button onclick="abrirCheckout()"
                    class="w-full bg-black text-white py-3 rounded-lg font-semibold
                 hover:bg-gray-800 transition-colors">
                Proceder al pago
            </button>
            <button onclick="confirmarVaciar()"
                    class="w-full mt-2 border border-gray-200 text-gray-500 py-2.5 rounded-lg text-sm
                 hover:border-red-300 hover:text-red-500 transition-colors">
                Vaciar carrito
            </button>
        </div>
    </div>
</main>

<div id="modal-checkout"
     class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md p-6">
        <h2 class="font-bold text-xl mb-4">Finalizar compra</h2>
        <div id="error-checkout"
             class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Dirección de envío</label>
                <textarea id="direccion" rows="2" placeholder="Calle, ciudad, barrio..."
                          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-black resize-none"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Método de pago</label>
                <select id="metodo-pago"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-black">
                    <option value="tarjeta_credito">Tarjeta de crédito</option>
                    <option value="tarjeta_debito">Tarjeta de débito</option>
                    <option value="pse">PSE</option>
                    <option value="efectivo">Efectivo contraentrega</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="cerrarCheckout()"
                    class="flex-1 border border-gray-200 py-2.5 rounded-lg text-sm font-medium
                 hover:bg-gray-50 transition-colors">
                Cancelar
            </button>
            <button onclick="confirmarPedido()" id="btn-confirmar"
                    class="flex-1 bg-black text-white py-2.5 rounded-lg text-sm font-semibold
                 hover:bg-gray-800 transition-colors">
                Confirmar pedido
            </button>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/carrito.js"></script>
</body>
</html>
