<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro — Rawstyle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <div class="text-center mb-8">
        <a href="../index.html" class="text-3xl font-bold tracking-tight">RAWSTYLE</a>
        <p class="text-gray-500 mt-2 text-sm">Crea tu cuenta gratis</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <div id="error"
             class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
        </div>
        <div id="exito"
             class="hidden bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-4 text-sm">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm"/>
            </div>

            <button onclick="registrarse()" id="btn-reg"
                    class="w-full bg-black text-white py-2.5 rounded-lg font-semibold
                 hover:bg-gray-800 transition-colors text-sm mt-2">
                Crear cuenta
            </button>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            ¿Ya tienes cuenta?
            <a href="login.html" class="text-black font-medium hover:underline">Inicia sesión</a>
        </p>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/registro.js"></script>
</body>
</html>
