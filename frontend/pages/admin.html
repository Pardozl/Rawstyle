<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admin — Rawstyle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .talla-check input { display: none; }
    .talla-check span {
      display: inline-block;
      padding: 4px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
      color: #374151;
    }
    .talla-check input:checked + span {
      border-color: #000;
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-black text-white sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <span class="text-xl font-bold tracking-tight">RAWSTYLE</span>
      <span class="text-gray-400 text-sm">Panel de administración</span>
    </div>
    <div class="flex gap-4">
      <a href="../index.html" class="text-sm text-gray-400 hover:text-white transition-colors">Ver tienda</a>
      <button onclick="cerrarSesion()" class="text-sm text-gray-400 hover:text-white transition-colors">Salir</button>
    </div>
  </div>
</nav>

<div class="bg-white border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 flex gap-6">
    <button onclick="mostrarTab('productos')" id="tab-productos"
            class="py-4 text-sm font-medium border-b-2 border-black text-black transition-colors">
      Productos
    </button>
    <button onclick="mostrarTab('pedidos')" id="tab-pedidos"
            class="py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-black transition-colors">
      Pedidos
    </button>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 py-8">
  <div id="section-productos">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-semibold">Gestión de productos</h2>
      <button onclick="abrirModalProducto()"
              class="bg-black text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors">
        + Nuevo producto
      </button>
    </div>
    <div id="loading-prod" class="text-center py-10 text-gray-400">Cargando...</div>
    <div id="tabla-productos" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Producto</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Categoría</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Precio</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Stock</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Tallas</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Estado</th>
          <th class="text-left px-6 py-3 font-medium text-gray-500">Acciones</th>
        </tr>
        </thead>
        <tbody id="body-productos" class="divide-y divide-gray-50"></tbody>
      </table>
    </div>
  </div>

  <div id="section-pedidos" class="hidden">
    <h2 class="text-xl font-semibold mb-6">Gestión de pedidos</h2>
    <div id="loading-ped" class="text-center py-10 text-gray-400">Cargando...</div>
    <div id="lista-pedidos-admin" class="hidden space-y-4"></div>
  </div>
</main>

<div id="modal-producto"
     class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg p-6 max-h-screen overflow-y-auto">
    <h2 class="font-bold text-xl mb-5" id="modal-titulo">Nuevo producto</h2>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input type="text" id="p-nombre"
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
        <select id="p-categoria"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black">
          <option value="1">Camisas</option>
          <option value="2">Pantalones</option>
          <option value="3">Busos</option>
          <option value="4">Chaquetas</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea id="p-descripcion" rows="3"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black resize-none"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Precio (COP)</label>
          <input type="number" id="p-precio" min="0"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
          <input type="number" id="p-stock" min="0"
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Tallas disponibles</label>
        <div class="flex flex-wrap gap-2" id="tallas-ropa">
          <label class="talla-check"><input type="checkbox" value="XS"> <span>XS</span></label>
          <label class="talla-check"><input type="checkbox" value="S">  <span>S</span></label>
          <label class="talla-check"><input type="checkbox" value="M">  <span>M</span></label>
          <label class="talla-check"><input type="checkbox" value="L">  <span>L</span></label>
          <label class="talla-check"><input type="checkbox" value="XL"> <span>XL</span></label>
          <label class="talla-check"><input type="checkbox" value="XXL"><span>XXL</span></label>
        </div>
        <div class="flex flex-wrap gap-2 mt-2" id="tallas-pantalon">
          <label class="talla-check"><input type="checkbox" value="28"><span>28</span></label>
          <label class="talla-check"><input type="checkbox" value="30"><span>30</span></label>
          <label class="talla-check"><input type="checkbox" value="32"><span>32</span></label>
          <label class="talla-check"><input type="checkbox" value="34"><span>34</span></label>
          <label class="talla-check"><input type="checkbox" value="36"><span>36</span></label>
          <label class="talla-check"><input type="checkbox" value="38"><span>38</span></label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">URL de imagen</label>
        <input type="text" id="p-imagen" placeholder="https://..."
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-black"/>
      </div>
      <div id="p-activo-div" class="hidden">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="p-activo" class="rounded"/>
          <span class="text-sm font-medium text-gray-700">Producto activo</span>
        </label>
      </div>
    </div>

    <div id="error-modal" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mt-4 text-sm"></div>

    <div class="flex gap-3 mt-6">
      <button onclick="cerrarModalProducto()" class="flex-1 border border-gray-200 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Cancelar</button>
      <button onclick="guardarProducto()" id="btn-guardar" class="flex-1 bg-black text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors">Guardar</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
